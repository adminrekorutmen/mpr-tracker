<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persetujuan Manpower - Rekosistem</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#F4F7FE] min-h-screen flex items-center justify-center p-4">
  <div class="bg-white w-full max-w-2xl p-8 rounded-3xl shadow-xl space-y-6">
    <div class="text-center space-y-2">
      <div class="w-12 h-12 bg-[#2E7D32] text-white rounded-xl flex items-center justify-center font-bold text-2xl mx-auto">R</div>
      <h1 class="text-xl font-bold text-[#0B1E43]">Approval Manpower Request</h1>
      <p class="text-xs text-slate-400">Evaluasi permintaan tenaga kerja baru</p>
    </div>
    <div id="detailContainer" class="bg-slate-50 p-6 rounded-2xl border border-slate-100 space-y-3 text-sm text-slate-600">
      <p class="text-center text-slate-400">Memuat detail pengajuan...</p>
    </div>
    <div id="actionContainer" class="hidden space-y-4">
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-2">Catatan Direksi</label>
        <textarea id="catatanDirektur" rows="3" placeholder="Masukkan catatan atau instruksi tambahan..." class="w-full px-4 py-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#2E7D32]"></textarea>
      </div>
      <div class="flex gap-4">
        <button id="rejectBtn" class="flex-1 py-3 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-xl text-sm transition-all">Tolak Pengajuan</button>
        <button id="approveBtn" class="flex-1 py-3 bg-green-700 hover:bg-green-800 text-white font-semibold rounded-xl text-sm transition-all">Setujui Pengajuan</button>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    // Ambil Token dari URL (?token=xxxxxx)
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('detailContainer').innerHTML = `<p class="text-red-500 text-center font-semibold">Error: Token Persetujuan Tidak Ditemukan.</p>`;
    } else {
      // Tampilkan kontainer aksi
      document.getElementById('actionContainer').classList.remove('hidden');
      document.getElementById('detailContainer').innerHTML = `
        <p class="text-center font-semibold text-[#0B1E43]">Menunggu Keputusan Direktur</p>
        <p class="text-xs text-center text-slate-400">Silakan tinjau data pada lampiran email Anda, lalu ambil keputusan di bawah ini.</p>
      `;

      // Event Listener untuk Tombol Setuju
      document.getElementById('approveBtn').addEventListener('click', () => kirimKeputusan('Approved'));
      document.getElementById('rejectBtn').addEventListener('click', () => kirimKeputusan('Rejected'));
    }

    async function kirimKeputusan(keputusan) {
      const catatan = document.getElementById('catatanDirektur').value;
      const btnApprove = document.getElementById('approveBtn');
      const btnReject = document.getElementById('rejectBtn');

      btnApprove.disabled = true;
      btnReject.disabled = true;

      try {
        const res = await callGAS({
          action: "buatKeputusan",
          token: token,
          keputusan: keputusan,
          catatan: catatan
        });

        if (res.status === "success") {
          alert("Keputusan berhasil disimpan!");
          document.body.innerHTML = `
            <div class="text-center p-8 space-y-4">
              <div class="text-5xl text-green-600"><i class="fa-solid fa-circle-check"></i></div>
              <h2 class="text-xl font-bold text-[#0B1E43]">Berhasil Diproses</h2>
              <p class="text-sm text-slate-500">Terima kasih atas keputusan Anda. Email notifikasi telah dikirimkan ke pengaju.</p>
            </div>
          `;
        } else {
          alert("Gagal: " + res.message);
        }
      } catch (err) {
        alert("Terjadi kesalahan koneksi saat mengirim keputusan.");
      } finally {
        btnApprove.disabled = false;
        btnReject.disabled = false;
      }
    }
  </script>
</body>
</html>
